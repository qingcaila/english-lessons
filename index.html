<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>English Lessons — 課程列表</title>
<style>
  :root {
    --bg: #faf8f3;
    --card: #fff;
    --ink: #2a2a2a;
    --muted: #6b6b6b;
    --accent: #c4633f;
    --border: #e5dfd2;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg); color: var(--ink);
    margin: 0; padding: 20px 14px 50px; line-height: 1.5;
    font-size: 17px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 35px; margin: 0 0 6px; }
  .subtitle { color: var(--muted); margin-bottom: 28px; font-size: 18px; }
  .lesson {
    display: block; padding: 20px 22px; margin-bottom: 14px;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    text-decoration: none; color: var(--ink); transition: background .15s;
  }
  .lesson:hover { background: #fff3ec; border-color: var(--accent); }
  .lesson .date { font-size: 16px; color: var(--accent); font-weight: 600; letter-spacing: .04em; }
  .lesson .title { font-size: 23px; font-weight: 600; margin: 6px 0 8px; }
  .lesson .desc { font-size: 18px; color: var(--muted); }
  footer { margin-top: 36px; color: var(--muted); font-size: 15px; text-align: center; }

  @media (max-width: 720px) {
    body { font-size: 15px; padding: 14px 12px 30px; }
    h1 { font-size: 22px; margin-bottom: 2px; }
    .subtitle { font-size: 12px; margin-bottom: 14px; }
    .lesson { padding: 12px 14px; margin-bottom: 8px; border-radius: 8px; }
    .lesson .date { font-size: 11px; }
    .lesson .title { font-size: 16px; margin: 3px 0 4px; }
    .lesson .desc { font-size: 12px; line-height: 1.45; color: var(--muted); }
    footer { font-size: 11px; margin-top: 20px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>English Lessons</h1>
  <div class="subtitle">拆字唸 · 圖像 + 注音 + 拆法 · 點按可播音</div>

  <a class="lesson" href="2026-05-13-01-compound-words.html">
    <div class="date">2026-05-13 · 第 1 輪</div>
    <div class="title">複合字拆字唸(10 字)</div>
    <div class="desc">bedtime / sailboat / treetop / raindrop / toothbrush / pancake / sunshine / weekend / sunrise / railroad — 複習池子:CVC · silent-e · sh · oo · ee · ai · oa</div>
  </a>

  <footer>更多課程會繼續加進來</footer>
</div>
</body>
</html>
