<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>2026-05-13 з¬¬дёҖијӘ вҖ” иӨҮеҗҲеӯ—жӢҶеӯ—е”ё</title>
<style>
  :root {
    --bg: #faf8f3;
    --card: #fff;
    --ink: #2a2a2a;
    --muted: #6b6b6b;
    --accent: #c4633f;
    --accent-soft: #f3dfd4;
    --border: #e5dfd2;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--ink);
    margin: 0;
    padding: 24px 16px 80px;
    line-height: 1.6;
    font-size: 20px;
    zoom: 1.1;
  }
  .wrap { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 33px; margin: 0 0 6px; }
  .subtitle { color: var(--muted); margin-bottom: 20px; font-size: 18px; }
  .topbar {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    margin-bottom: 24px; padding: 14px 16px;
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  }
  .topbar label { font-size: 18px; color: var(--muted); }
  .topbar select, .topbar button {
    font-size: 18px; padding: 10px 16px; border-radius: 8px;
    border: 1px solid var(--border); background: #fff; cursor: pointer;
    font-family: inherit;
  }
  .topbar button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .topbar button:hover { background: var(--accent-soft); }
  .topbar button.primary:hover { background: #a8512f; }
  table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
  thead th {
    text-align: left; font-size: 17px; color: var(--muted);
    font-weight: 500; padding: 4px 12px;
  }
  tbody tr {
    background: var(--card); border: 1px solid var(--border);
    cursor: pointer; transition: background .12s;
  }
  tbody tr:hover { background: #fff3ec; }
  tbody tr:active td { background: var(--accent-soft); }
  .voice-label { font-size: 14px; color: var(--muted); margin-left: 4px; }
  .hint { font-size: 14px; color: var(--muted); margin-bottom: 16px; padding: 0 4px; }
  tr.loading td { opacity: 0.6; }
  tr .source-badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
  tr .source-badge.human { background: #d9efd6; color: #2d7a2d; }
  tr .source-badge.tts { background: #ffe6d6; color: #a04a1a; }
  tbody td {
    padding: 18px 12px; border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border); vertical-align: middle;
  }
  tbody td:first-child { border-left: 1px solid var(--border); border-radius: 10px 0 0 10px; }
  tbody td:last-child { border-right: 1px solid var(--border); border-radius: 0 10px 10px 0; }
  tbody tr.active td { background: var(--accent-soft); }
  .num { font-weight: 700; color: var(--accent); width: 32px; text-align: center; font-size: 20px; }
  .img { font-size: 38px; width: 80px; text-align: center; }
  .word { font-size: 29px; font-weight: 600; }
  .pinyin { color: var(--muted); font-size: 18px; }
  .split { color: var(--muted); font-size: 17px; }
  .meaning { font-size: 20px; font-weight: 500; }
  footer { margin-top: 32px; color: var(--muted); font-size: 15px; text-align: center; }

  /* жүӢж©ҹ:ж•ҙй«”еҶҚж”ҫеӨ§,дёҰдё”жҠҠиЎЁж јж”№жҲҗеҚЎзүҮе Ҷз–ҠејҸ */
  @media (max-width: 720px) {
    body { font-size: 21px; padding: 20px 12px 80px; }
    h1 { font-size: 35px; }
    .subtitle { font-size: 19px; }
    .topbar { gap: 10px; padding: 12px; }
    .topbar select, .topbar button { font-size: 19px; padding: 12px 14px; }
    thead { display: none; }
    table, tbody { display: block; width: 100%; }
    tbody tr {
      margin-bottom: 14px; border-radius: 12px;
      border: 1px solid var(--border); padding: 16px;
      height: 240px;
      display: grid;
      grid-template-columns: 90px 1fr;
      grid-template-rows: auto auto auto 1fr;
      grid-template-areas:
        "num     meaning"
        "img     word"
        "img     pinyin"
        "split   split";
      column-gap: 14px; row-gap: 4px;
      align-items: center;
    }
    tbody td { border: none; padding: 0; display: block; }
    .num    { grid-area: num;     justify-self: start; align-self: start;
              display: inline-block; width: auto; font-size: 18px; padding: 4px 12px;
              background: var(--accent-soft); color: var(--accent); border-radius: 6px; }
    .meaning{ grid-area: meaning; align-self: start; font-size: 22px; font-weight: 500; }
    .img    { grid-area: img;     font-size: 52px; text-align: center; align-self: center; line-height: 1; }
    .word-cell { grid-area: word; align-self: end; }
    .word   { font-size: 32px; }
    .pinyin { grid-area: pinyin;  font-size: 19px; align-self: start; }
    .split  { grid-area: split;   font-size: 16px; align-self: end;
              padding-top: 6px; border-top: 1px dashed var(--border); }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>з¬¬дёҖијӘ вҖ” иӨҮеҗҲеӯ—жӢҶеӯ—е”ё(е…ЁйғЁз”ЁиҲҠиҰҸеүҮзө„еҗҲ)</h1>
  <div class="subtitle">2026-05-13 В· 8 еҖӢеӯ— В· иӨҮзҝ’жұ еӯҗ:CVC В· silent-e В· sh В· oo В· ee В· ai В· oa</div>

  <div class="topbar">
    <button class="primary" onclick="speakAll()">рҹ”Ҡ е…ЁйғЁдҫқеәҸе”ё</button>
    <button onclick="stopAll()">вҸ№ еҒңжӯў</button>
    <label>йҖҹеәҰ
      <select id="rate" onchange="updateRate()">
        <option value="0.6">ж…ў</option>
        <option value="0.75" selected>жӯЈеёё(еӯёзҝ’иҖ…з”Ё)</option>
        <option value="0.9">ијғеҝ«</option>
        <option value="1">еҺҹйҖҹ</option>
      </select>
    </label>
    <span id="voiceLabel" class="voice-label"></span>
  </div>
  <div class="hint">рҹ”Ҡ й»һд»»дҪ•еҚЎзүҮзҷјйҹі</div>

  <table>
    <thead>
      <tr>
        <th>#</th><th>ж„ҸжҖқ</th><th>ең–</th><th>еӯ—</th><th>жіЁйҹі</th><th>жӢҶжі•</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <footer>з”ЁзҖҸиҰҪеҷЁе…§е»әиӘһйҹіеҗҲжҲҗгҖӮз¬¬дёҖж¬ЎжҢүеҸҜиғҪиҰҒзӯү 1 з§’ијүе…ҘиҒІйҹігҖӮ</footer>
</div>

<script>
const WORDS = [
  { n:1, mean:"е°ұеҜўжҷӮй–“", img:"рҹӣҸпёҸрҹ•ҳ", word:"bedtime",    py:"г„…г„қг„ү-г„Ҡг„һг„Ү",   split:"bed (CVC) + time (silent-e)" },
  { n:2, mean:"еёҶиҲ№",     img:"вӣө",     word:"sailboat",   py:"г„ҷг„ҹг„ӣ-г„…г„Ўг„Ҡ",   split:"sail (ai) + boat (oa)" },
  { n:3, mean:"жЁ№й Ӯ",     img:"рҹҢірҹ”қ",   word:"treetop",    py:"г„”г„Ұг„§-г„Ҡг„ҡг„Ҷ",   split:"tree (ee) + top (CVC)" },
  { n:4, mean:"йӣЁж»ҙ",     img:"рҹҢ§пёҸрҹ’§",  word:"raindrop",   py:"г„–г„ҹг„Ј-г„үг„–г„ҡг„Ҷ", split:"rain (ai) + drop (CVC)" },
  { n:5, mean:"зүҷеҲ·",     img:"рҹҰ·рҹӘҘ",  word:"toothbrush", py:"г„Ҡг„Ёг„ҷ-г„…г„–г„ҡг„’", split:"tooth (oo) + brush (sh+CVC)" },
  { n:6, mean:"й¬ҶйӨ…",     img:"рҹҘһ",    word:"pancake",    py:"г„Ҷг„ў-г„Һг„ҹг„Һ",     split:"pan (CVC) + cake (silent-e)" },
  { n:7, mean:"йҷҪе…ү",     img:"вҳҖпёҸ",    word:"sunshine",   py:"г„ҷг„ў-г„’г„һг„Ј",     split:"sun (CVC) + shine (sh+silent-e)" },
  { n:8, mean:"йҖұжң«",     img:"рҹ“…",    word:"weekend",    py:"г„Ёг„§-г„Һг„қг„Јг„ү",   split:"week (ee) + end (CVC)" },
];

const tbody = document.getElementById("rows");
WORDS.forEach(w => {
  const tr = document.createElement("tr");
  tr.id = "row-" + w.n;
  tr.setAttribute("role", "button");
  tr.setAttribute("aria-label", "е”ё " + w.word);
  tr.onclick = () => speakOne(w.n);
  tr.innerHTML = `
    <td class="num">${w.n}</td>
    <td class="meaning">${w.mean}</td>
    <td class="img">${w.img}</td>
    <td class="word-cell"><div class="word">${w.word}</div></td>
    <td class="pinyin">${w.py}</td>
    <td class="split">${w.split}</td>
  `;
  tbody.appendChild(tr);
});

let rate = 0.85;
function updateRate() { rate = parseFloat(document.getElementById("rate").value); }

// в”Җв”Җ зі»зөұ TTS еӮҷжҸҙз”Ё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let chosenVoice = null;
function pickBestVoice() {
  const all = speechSynthesis.getVoices();
  const en = all.filter(v => v.lang.startsWith("en"));
  if (en.length === 0) return null;
  const isEnhanced = v => /Enhanced|Premium|еўһеј·|й«ҳзҙҡ|Neural|Natural|Siri/i.test(v.name);
  const isFemale = v => /Sangeeta|Samantha|Ava|Allison|Susan|Karen|Tessa|Moira|Fiona|Veena|Zira|Aria|Jenny|Joanna|Salli|Kimberly|Kendra|Ivy|Emma|Amy|Nicole|Olivia|Catherine|Serena|Lana|female|еҘі/i.test(v.name);
  return en.find(x => isEnhanced(x) && isFemale(x))
      || en.find(isFemale)
      || en.find(isEnhanced)
      || en[0];
}
function loadVoices() {
  chosenVoice = pickBestVoice();
  const label = document.getElementById("voiceLabel");
  if (label && chosenVoice) label.textContent = "еӮҷжҸҙзі»зөұиӘһйҹі:" + chosenVoice.name;
}
loadVoices();
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = loadVoices;
}

// в”Җв”Җ ж’ӯйҹі(зҙ”зі»зөұ TTS)в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function speakOne(n) {
  const w = WORDS.find(x => x.n === n); if (!w) return;
  stopAll();
  highlight(n);
  const u = new SpeechSynthesisUtterance(w.word);
  u.lang = "en-US"; u.rate = rate;
  if (chosenVoice) u.voice = chosenVoice;
  u.onend = () => unhighlight(n);
  speechSynthesis.speak(u);
}
function speakAll() {
  stopAll();
  WORDS.forEach(w => {
    const u = new SpeechSynthesisUtterance(w.word);
    u.lang = "en-US"; u.rate = rate;
    if (chosenVoice) u.voice = chosenVoice;
    u.onstart = () => highlight(w.n);
    u.onend = () => unhighlight(w.n);
    speechSynthesis.speak(u);
  });
}
function stopAll() {
  speechSynthesis.cancel();
  document.querySelectorAll("tr.active").forEach(tr => tr.classList.remove("active"));
}
function highlight(n) { document.getElementById("row-" + n)?.classList.add("active"); }
function unhighlight(n) { document.getElementById("row-" + n)?.classList.remove("active"); }
</script>
</body>
</html>
