<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>2026-05-13 第一輪 — 複合字拆字唸</title>
<style>
  :root {
    --bg: #faf8f3;
    --card: #fff;
    --ink: #2a2a2a;
    --muted: #6b6b6b;
    --accent: #c4633f;
    --accent-soft: #f3dfd4;
    --border: #e5dfd2;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--ink);
    margin: 0;
    padding: 24px 16px 80px;
    line-height: 1.6;
    font-size: 20px;
  }
  .wrap { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 33px; margin: 0 0 6px; }
  .subtitle { color: var(--muted); margin-bottom: 20px; font-size: 18px; }
  .topbar {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    margin-bottom: 24px; padding: 14px 16px;
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  }
  .topbar label { font-size: 18px; color: var(--muted); }
  .topbar select, .topbar button {
    font-size: 18px; padding: 10px 16px; border-radius: 8px;
    border: 1px solid var(--border); background: #fff; cursor: pointer;
    font-family: inherit;
  }
  .topbar button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .topbar button:hover { background: var(--accent-soft); }
  .topbar button.primary:hover { background: #a8512f; }
  table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
  thead th {
    text-align: left; font-size: 17px; color: var(--muted);
    font-weight: 500; padding: 4px 12px;
  }
  tbody tr {
    background: var(--card); border: 1px solid var(--border);
    cursor: pointer; transition: background .12s;
  }
  tbody tr:hover { background: #fff3ec; }
  tbody tr:active td { background: var(--accent-soft); }
  .voice-label { font-size: 14px; color: var(--muted); margin-left: 4px; }
  .hint { font-size: 14px; color: var(--muted); margin-bottom: 16px; padding: 0 4px; }
  tr.loading td { opacity: 0.6; }
  tr .source-badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
  tr .source-badge.human { background: #d9efd6; color: #2d7a2d; }
  tr .source-badge.tts { background: #ffe6d6; color: #a04a1a; }
  tbody td {
    padding: 18px 12px; border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border); vertical-align: middle;
  }
  tbody td:first-child { border-left: 1px solid var(--border); border-radius: 10px 0 0 10px; }
  tbody td:last-child { border-right: 1px solid var(--border); border-radius: 0 10px 10px 0; }
  tbody tr.active td { background: var(--accent-soft); }
  .num { font-weight: 700; color: var(--accent); width: 32px; text-align: center; font-size: 20px; }
  .img { font-size: 38px; width: 80px; text-align: center; }
  .word { font-size: 29px; font-weight: 600; }
  .pinyin { color: var(--muted); font-size: 18px; }
  .split { color: var(--muted); font-size: 17px; }
  .meaning { font-size: 20px; font-weight: 500; }
  footer { margin-top: 32px; color: var(--muted); font-size: 15px; text-align: center; }

  /* 手機:整體再放大,並且把表格改成卡片堆疊式 */
  @media (max-width: 720px) {
    body { font-size: 21px; padding: 20px 12px 80px; }
    h1 { font-size: 35px; }
    .subtitle { font-size: 19px; }
    .topbar { gap: 10px; padding: 12px; }
    .topbar select, .topbar button { font-size: 19px; padding: 12px 14px; }
    thead { display: none; }
    table, tbody, tr, td { display: block; width: 100%; }
    tbody tr {
      margin-bottom: 14px; border-radius: 12px;
      border: 1px solid var(--border); padding: 14px 10px;
      min-height: 260px;
      display: flex; flex-direction: column; justify-content: flex-start;
    }
    tbody td { border: none; padding: 4px 14px; }
    tbody td:first-child, tbody td:last-child { border-radius: 0; }
    .num { display: inline-block; width: auto; font-size: 18px; padding: 4px 10px;
           background: var(--accent-soft); color: var(--accent); border-radius: 6px; }
    .meaning { font-size: 22px; }
    .img { font-size: 44px; text-align: left; padding-top: 2px; }
    .word { font-size: 33px; }
    .pinyin { font-size: 20px; }
    .split { font-size: 17px; margin-top: auto; padding-top: 8px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>第一輪 — 複合字拆字唸(全部用舊規則組合)</h1>
  <div class="subtitle">2026-05-13 · 8 個字 · 複習池子:CVC · silent-e · sh · oo · ee · ai · oa</div>

  <div class="topbar">
    <button class="primary" onclick="speakAll()">🔊 全部依序唸</button>
    <button onclick="stopAll()">⏹ 停止</button>
    <label>速度
      <select id="rate" onchange="updateRate()">
        <option value="0.6">慢</option>
        <option value="0.75" selected>正常(學習者用)</option>
        <option value="0.9">較快</option>
        <option value="1">原速</option>
      </select>
    </label>
    <span id="voiceLabel" class="voice-label"></span>
  </div>
  <div class="hint">🔊 點任何卡片發音 · 優先用 Free Dictionary 真人錄音,沒有的字才用系統語音備援</div>

  <table>
    <thead>
      <tr>
        <th>#</th><th>意思</th><th>圖</th><th>字</th><th>注音</th><th>拆法</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <footer>用瀏覽器內建語音合成。第一次按可能要等 1 秒載入聲音。</footer>
</div>

<script>
const WORDS = [
  { n:1, mean:"就寢時間", img:"🛏️🕘", word:"bedtime",    py:"ㄅㄝㄉ-ㄊㄞㄇ",   split:"bed (CVC) + time (silent-e)" },
  { n:2, mean:"帆船",     img:"⛵",     word:"sailboat",   py:"ㄙㄟㄛ-ㄅㄡㄊ",   split:"sail (ai) + boat (oa)" },
  { n:3, mean:"樹頂",     img:"🌳🔝",   word:"treetop",    py:"ㄔㄦㄧ-ㄊㄚㄆ",   split:"tree (ee) + top (CVC)" },
  { n:4, mean:"雨滴",     img:"🌧️💧",  word:"raindrop",   py:"ㄖㄟㄣ-ㄉㄖㄚㄆ", split:"rain (ai) + drop (CVC)" },
  { n:5, mean:"牙刷",     img:"🦷🪥",  word:"toothbrush", py:"ㄊㄨㄙ-ㄅㄖㄚㄒ", split:"tooth (oo) + brush (sh+CVC)" },
  { n:6, mean:"鬆餅",     img:"🥞",    word:"pancake",    py:"ㄆㄢ-ㄎㄟㄎ",     split:"pan (CVC) + cake (silent-e)" },
  { n:7, mean:"陽光",     img:"☀️",    word:"sunshine",   py:"ㄙㄢ-ㄒㄞㄣ",     split:"sun (CVC) + shine (sh+silent-e)" },
  { n:8, mean:"週末",     img:"📅",    word:"weekend",    py:"ㄨㄧ-ㄎㄝㄣㄉ",   split:"week (ee) + end (CVC)" },
];

const tbody = document.getElementById("rows");
WORDS.forEach(w => {
  const tr = document.createElement("tr");
  tr.id = "row-" + w.n;
  tr.setAttribute("role", "button");
  tr.setAttribute("aria-label", "唸 " + w.word);
  tr.onclick = () => speakOne(w.n);
  tr.innerHTML = `
    <td class="num">${w.n}</td>
    <td class="meaning">${w.mean}</td>
    <td class="img">${w.img}</td>
    <td><div class="word">${w.word}</div></td>
    <td class="pinyin">${w.py}</td>
    <td class="split">${w.split}</td>
  `;
  tbody.appendChild(tr);
});

let rate = 0.85;
function updateRate() { rate = parseFloat(document.getElementById("rate").value); }

// ── 系統 TTS 備援用 ────────────────────────────────────
let chosenVoice = null;
function pickBestVoice() {
  const all = speechSynthesis.getVoices();
  const en = all.filter(v => v.lang.startsWith("en"));
  if (en.length === 0) return null;
  const isEnhanced = v => /Enhanced|Premium|增強|高級|Neural|Natural|Siri/i.test(v.name);
  const isFemale = v => /Sangeeta|Samantha|Ava|Allison|Susan|Karen|Tessa|Moira|Fiona|Veena|Zira|Aria|Jenny|Joanna|Salli|Kimberly|Kendra|Ivy|Emma|Amy|Nicole|Olivia|Catherine|Serena|Lana|female|女/i.test(v.name);
  return en.find(x => isEnhanced(x) && isFemale(x))
      || en.find(isFemale)
      || en.find(isEnhanced)
      || en[0];
}
function loadVoices() {
  chosenVoice = pickBestVoice();
  const label = document.getElementById("voiceLabel");
  if (label && chosenVoice) label.textContent = "備援系統語音:" + chosenVoice.name;
}
loadVoices();
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = loadVoices;
}

// ── Free Dictionary API 真人發音 ──────────────────────
const audioCache = {};
async function fetchAudioUrl(word) {
  if (word in audioCache) return audioCache[word];
  try {
    const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
    if (!r.ok) { audioCache[word] = null; return null; }
    const data = await r.json();
    for (const entry of data) {
      for (const ph of (entry.phonetics || [])) {
        if (ph.audio && /^https?:/.test(ph.audio)) {
          audioCache[word] = ph.audio;
          return ph.audio;
        }
      }
    }
    audioCache[word] = null; return null;
  } catch (e) { audioCache[word] = null; return null; }
}

// ── 播音(真人優先,TTS 備援)─────────────────────────
let currentAudio = null;
function setBadge(n, kind) {
  const tr = document.getElementById("row-" + n); if (!tr) return;
  tr.querySelectorAll(".source-badge").forEach(b => b.remove());
  const span = document.createElement("span");
  span.className = "source-badge " + (kind === "human" ? "human" : "tts");
  span.textContent = kind === "human" ? "真人" : "TTS";
  const wordEl = tr.querySelector(".word"); if (wordEl) wordEl.appendChild(span);
}
function speakOne(n) { return speakWord(WORDS.find(x => x.n === n)); }
async function speakWord(w) {
  if (!w) return;
  stopAll();
  highlight(w.n);
  const tr = document.getElementById("row-" + w.n);
  tr?.classList.add("loading");
  const url = await fetchAudioUrl(w.word);
  tr?.classList.remove("loading");
  return new Promise(resolve => {
    if (url) {
      const audio = new Audio(url);
      currentAudio = audio;
      audio.playbackRate = Math.max(0.6, Math.min(rate + 0.1, 1.2));
      audio.onended = () => { unhighlight(w.n); currentAudio = null; resolve(); };
      audio.onerror = () => ttsFallback(w, resolve);
      audio.play().then(() => setBadge(w.n, "human")).catch(() => ttsFallback(w, resolve));
    } else {
      ttsFallback(w, resolve);
    }
  });
}
function ttsFallback(w, resolve) {
  setBadge(w.n, "tts");
  const u = new SpeechSynthesisUtterance(w.word);
  u.lang = "en-US"; u.rate = rate;
  if (chosenVoice) u.voice = chosenVoice;
  u.onend = () => { unhighlight(w.n); resolve && resolve(); };
  speechSynthesis.speak(u);
}
async function speakAll() {
  stopAll();
  for (const w of WORDS) {
    await speakWord(w);
    await new Promise(r => setTimeout(r, 250));
  }
}
function stopAll() {
  speechSynthesis.cancel();
  if (currentAudio) { try { currentAudio.pause(); } catch (e) {} currentAudio = null; }
  document.querySelectorAll("tr.active").forEach(tr => tr.classList.remove("active"));
  document.querySelectorAll("tr.loading").forEach(tr => tr.classList.remove("loading"));
}
function highlight(n) { document.getElementById("row-" + n)?.classList.add("active"); }
function unhighlight(n) { document.getElementById("row-" + n)?.classList.remove("active"); }
</script>
</body>
</html>
