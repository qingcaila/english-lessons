<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>英文課程</title>
<style>
  :root {
    --bg: #faf8f3; --card: #fff; --ink: #2a2a2a; --muted: #6b6b6b;
    --accent: #c4633f; --accent-soft: #f3dfd4; --border: #e5dfd2;
    --good: #2d7a2d; --good-bg: #d9efd6;
    --bad: #a04a1a; --bad-bg: #ffe6d6;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg); color: var(--ink);
    margin: 0; padding: 6px 8px 30px; line-height: 1.4; font-size: 13px;
  }
  .wrap { max-width: 960px; margin: 0 auto; }

  .topbar {
    display: flex; gap: 6px; align-items: center;
    padding: 6px 8px; margin-bottom: 4px;
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  }
  .topbar label { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 3px; }
  .topbar select, .topbar button {
    font-size: 12px; padding: 5px 9px; border-radius: 5px;
    border: 1px solid var(--border); background: #fff; cursor: pointer; font-family: inherit;
    white-space: nowrap;
  }
  .topbar select { padding: 4px 4px; }
  .topbar button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .topbar a.home {
    font-size: 16px; color: var(--muted); text-decoration: none;
    padding: 4px 8px; line-height: 1;
    border: 1px solid var(--border); border-radius: 5px; background: #fff;
  }
  .topbar a.home:hover { background: var(--accent-soft); color: var(--accent); }
  .topbar .spacer { flex: 1; }
  .topbar .next-round {
    background: var(--accent); color: #fff;
    border: 1px solid var(--accent); font-weight: 600;
  }
  .topbar .next-round:hover { background: #a8512f; }
  .topbar .finish {
    background: #fff; color: var(--muted);
    border: 1px solid var(--border);
  }
  .topbar .finish:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }

  /* lesson info 獨立一行,避免擠 */
  .lesson-info {
    display: flex; gap: 8px; flex-wrap: wrap;
    font-size: 10.5px; color: var(--muted);
    padding: 0 6px; margin-bottom: 6px;
    line-height: 1.4;
  }
  .lesson-info .chip {
    background: #fdf8f3; padding: 1px 6px; border-radius: 3px;
  }

  .hint { font-size: 10px; margin-bottom: 4px; padding: 0 2px; color: var(--muted); }

  /* 卡片 */
  /* 拆字唸:字母完全相連,底線用 ::after 畫且比 chunk 短,留視覺斷點 */
  .word { display: inline-flex; gap: 0; align-items: baseline; }
  .word .chunk {
    display: inline-block;
    position: relative;
    cursor: pointer;
    padding-bottom: 3px;
  }
  .chunk::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 3px;                       /* ← 底線比 chunk 短 3px,留斷點 */
    height: 2px;
    background: var(--accent);
  }
  .chunk:last-child::after { right: 0; }
  .chunk:hover, .chunk:active { background: var(--accent-soft); }

  table { width: 100%; border-collapse: separate; border-spacing: 0; }
  tbody tr {
    background: var(--card); border: 1px solid var(--border);
    cursor: pointer; transition: background .12s;
    margin-bottom: 3px; border-radius: 6px; padding: 4px 8px;
    height: 60px;
    display: grid;
    grid-template-columns: 30px 1fr auto auto;
    grid-template-rows: auto auto;
    grid-template-areas:
      "num wordline meaning actions"
      "img split    meaning actions";
    column-gap: 5px; row-gap: 0;
    align-items: center;
    height: 54px;
  }
  tbody tr.is-review { border-left: 3px solid var(--accent); }
  tbody tr.is-new { border-left: 3px solid var(--good); }
  tbody td { border: none; padding: 0; display: block; }

  .num {
    grid-area: num; align-self: start; justify-self: start;
    display: inline-block; font-size: 11px; padding: 1px 5px;
    background: var(--accent-soft); color: var(--accent); border-radius: 3px;
  }
  .meaning { grid-area: meaning; align-self: center; justify-self: end;
             font-size: 12px; color: var(--muted); font-weight: 500; white-space: nowrap; }
  .img { grid-area: img; font-size: 16px; text-align: left; align-self: center; line-height: 1;
         white-space: nowrap; letter-spacing: 0; overflow: hidden; }
  .word-cell { grid-area: wordline; align-self: center;
               display: flex; align-items: baseline; gap: 6px; flex-wrap: nowrap;
               min-width: 0; overflow: hidden; }
  .word { font-size: 16px; font-weight: 600; line-height: 1.1; flex-shrink: 0; }
  .chunk { padding-bottom: 2px; }
  .chunk::after { height: 1.5px; }
  .pinyin { font-size: 10.5px; color: var(--muted); white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .play-count { font-size: 9px; color: var(--muted); margin-left: 4px; opacity: .7; }
  .split { grid-area: split; font-size: 10px; color: var(--muted); align-self: start; line-height: 1.2; }
  .actions {
    grid-area: actions; align-self: center;
    display: flex; flex-direction: column; gap: 3px; margin-left: 4px;
  }
  .btn-know, .btn-forgot {
    font-size: 11px; padding: 2px 5px; border-radius: 4px; border: 1px solid var(--border);
    background: #fff; cursor: pointer; font-family: inherit;
    line-height: 1.2; min-width: 36px; text-align: center;
  }
  .btn-know { color: var(--good); border-color: var(--good); }
  .btn-know.on { background: var(--good-bg); }
  .btn-forgot { color: var(--bad); border-color: var(--bad); }
  .btn-forgot.on { background: var(--bad-bg); }

  /* 結束總結 */
  .summary {
    margin-top: 16px; padding: 12px; background: var(--card);
    border: 1px solid var(--border); border-radius: 8px;
  }
  .summary h2 { margin: 0 0 8px; font-size: 16px; }
  .summary .stats { display: flex; gap: 12px; font-size: 12px; }
  .summary .emoji-eval { margin-top: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
  .summary .emoji-eval button {
    font-size: 13px; padding: 6px 10px; border-radius: 6px;
    border: 1px solid var(--border); background: #fff; cursor: pointer; font-family: inherit;
  }
  .summary .emoji-eval button:hover { background: var(--accent-soft); }

  .loading { padding: 24px; text-align: center; color: var(--muted); }

  /* 注音顯示開關 */
  body.hide-pinyin .pinyin { display: none !important; }
  .toggle-btn.on { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }

  /* NEW 標籤 — 未互動過的字 */
  .meaning { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
  .new-badge {
    font-size: 9px; color: #c00; font-weight: 700;
    background: #ffe5e5; padding: 0 4px; border-radius: 3px;
    line-height: 1.5; display: none;
  }
  .new-badge.show { display: inline-block; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="home" href="index.html" title="回首頁">←</a>
    <button class="primary" onclick="speakAll()" title="全部依序唸">🔊</button>
    <button onclick="stopAll()" title="停止">⏹</button>
    <label>
      <select id="rate" onchange="updateRate()">
        <option value="0.6" selected>慢</option>
        <option value="0.75">正常</option>
        <option value="0.9">較快</option>
        <option value="1">原速</option>
      </select>
    </label>
    <button class="toggle-btn on" id="pinyinToggle" onclick="togglePinyin()">注音</button>
    <span class="spacer"></span>
    <button class="next-round" id="nextBtn" onclick="goNextRound()">下一輪 →</button>
    <button class="finish" id="finishBtn" onclick="forceShowSummary()">結束</button>
  </div>
  <div class="lesson-info" id="lessonInfo"></div>
  <div class="hint">🔊 點卡片唸整字 · 點底線唸該音節 · 不會的可標 ❌</div>

  <table><tbody id="rows"><tr><td><div class="loading">載入中...</div></td></tr></tbody></table>

  <div id="summary"></div>
</div>

<script src="srs.js"></script>
<script>
// ── 設定 ──────────────────────────────────────────────────
let rate = 0.6;
function updateRate() { rate = parseFloat(document.getElementById("rate").value); }

function applyPinyinSetting(show) {
  document.body.classList.toggle("hide-pinyin", !show);
  const btn = document.getElementById("pinyinToggle");
  if (btn) btn.classList.toggle("on", show);
}
function togglePinyin() {
  const cur = SRS.getSettings().showPinyin !== false;
  const next = !cur;
  SRS.setSetting("showPinyin", next);
  applyPinyinSetting(next);
}

const params = new URLSearchParams(location.search);
const mode = params.get("mode") || "frequency";
const wordCount = parseInt(params.get("count") || "10", 10);
const ratio = parseFloat(params.get("ratio") || "0.3");      // 新字比例
const themeFilter = params.get("theme");
const stagePool = params.get("stagePool") || "cumulative"; // "cumulative" | "exclusive"

// ── 語音 ──────────────────────────────────────────────────
let chosenVoice = null;
function pickBestVoice() {
  const all = speechSynthesis.getVoices();
  const en = all.filter(v => v.lang.startsWith("en"));
  if (en.length === 0) return null;
  const isEnhanced = v => /Enhanced|Premium|增強|高級|Neural|Natural|Siri/i.test(v.name);
  const isFemale = v => /Sangeeta|Samantha|Ava|Allison|Susan|Karen|Tessa|Moira|Fiona|Veena|Zira|Aria|Jenny|Joanna|Salli|Kimberly|Kendra|Ivy|Emma|Amy|Nicole|Olivia|Catherine|Serena|Lana|female|女/i.test(v.name);
  return en.find(x => isEnhanced(x) && isFemale(x)) || en.find(isFemale) || en.find(isEnhanced) || en[0];
}
function loadVoices() { chosenVoice = pickBestVoice(); }
loadVoices();
if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;

// ── 選字邏輯 ──────────────────────────────────────────────
let WORDS = [];          // 此輪要呈現的字
let VOCAB = [];          // 全部 seed 字
let currentRound = "R1";

async function loadData() {
  const [v, t] = await Promise.all([
    fetch("vocab.json").then(r => r.json()),
    fetch("themes.json").then(r => r.json())
  ]);
  VOCAB = v.words;
  return { vocab: v, themes: t };
}

function pickWords({ vocab, themes }) {
  const state = SRS.loadState();
  currentRound = SRS.getCurrentRound();

  // 1) 抓該複習的(due)
  const due = SRS.dueForReview(currentRound);
  const dueIds = due.map(w => w.word);
  const learnedIds = new Set(Object.keys(state.words));

  // 2) 候選新字池(根據 mode 篩)
  const currentStage = state.stats.currentStage || 0;
  let newPool = vocab.words.filter(w => !learnedIds.has(w.word));
  // Stage 硬過濾(challenge 模式自己處理,跳過)
  //   cumulative: stage ≤ currentStage(預設,包含舊 Stage 字)
  //   exclusive:  stage === currentStage(只練本階段字)
  if (mode !== "challenge") {
    if (stagePool === "exclusive") {
      newPool = newPool.filter(w => (w.stage || 0) === currentStage);
    } else {
      newPool = newPool.filter(w => (w.stage || 0) <= currentStage);
    }
  }
  if (mode === "theme" && themeFilter) {
    newPool = newPool.filter(w => w.theme === themeFilter || (w.tags && w.tags.includes(themeFilter)));
  } else if (mode === "frequency") {
    // 按 theme.frequencyRank 排
    const rankMap = {};
    themes.themes.forEach(t => rankMap[t.id] = t.frequencyRank);
    newPool.sort((a, b) => (rankMap[a.theme] || 99) - (rankMap[b.theme] || 99));
  } else if (mode === "random") {
    newPool.sort(() => Math.random() - 0.5);
  } else if (mode === "mixed") {
    // 一半從目前 theme(by frequency),一半隨機
    const rankMap = {};
    themes.themes.forEach(t => rankMap[t.id] = t.frequencyRank);
    newPool.sort((a, b) => (rankMap[a.theme] || 99) - (rankMap[b.theme] || 99));
    const half = newPool.splice(0, Math.ceil(wordCount * (1 - ratio) / 2));
    newPool.sort(() => Math.random() - 0.5);
    newPool = [...half, ...newPool];
  } else if (mode === "review") {
    // 純複習 → 全部用 due,沒新字
    return due.slice(0, wordCount);
  } else if (mode === "challenge") {
    // 下一階段預覽,挑 stage = currentStage + 1
    const nextStage = (state.stats.currentStage || 0) + 1;
    newPool = vocab.words.filter(w => !learnedIds.has(w.word) && w.stage === nextStage);
  }

  // 3) 混合 (1 - ratio) 複習 + ratio 新字
  const reviewCount = Math.min(due.length, Math.round(wordCount * (1 - ratio)));
  const newCount = wordCount - reviewCount;
  const reviews = due.slice(0, reviewCount).map(w => ({ ...w, isReview: true }));
  const newWords = newPool.slice(0, newCount).map(w => ({ ...w, isReview: false }));

  const list = [...reviews, ...newWords].map((w, i) => ({ n: i + 1, ...w }));
  // 把字池狀況存到 window,方便 init() 偵測
  window._poolStatus = {
    requested: wordCount,
    actual: list.length,
    requestedNew: newCount,
    actualNew: newWords.length,
    newPoolRemaining: Math.max(0, newPool.length - newWords.length),
    dueRemaining: Math.max(0, due.length - reviews.length),
  };
  return list;
}

// ── 渲染 ──────────────────────────────────────────────────
function render() {
  const tbody = document.getElementById("rows");
  tbody.innerHTML = "";
  WORDS.forEach(w => {
    const tr = document.createElement("tr");
    tr.id = "row-" + w.n;
    tr.className = w.isReview ? "is-review" : "is-new";
    tr.setAttribute("role", "button");
    tr.setAttribute("aria-label", "唸 " + w.word);
    tr.onclick = (ev) => {
      if (ev.target.closest(".btn-know,.btn-forgot,.chunk")) return;
      speakOne(w.n);
    };
    const wordInner = (w.chunks && w.chunks.length > 1)
      ? w.chunks.map(c => `<span class="chunk" onclick="speakChunk('${w.word}','${c}', event)">${c}</span>`).join("")
      : `<span>${w.word}</span>`;
    tr.innerHTML = `
      <td class="num">${w.n}${w.isReview ? "🔁" : ""}</td>
      <td class="meaning">
        <span>${w.mean}</span>
        <span class="new-badge" id="new-${w.n}">NEW</span>
      </td>
      <td class="img">${w.img}</td>
      <td class="word-cell">
        <span class="word">${wordInner}</span>
        <span class="pinyin">${w.py}</span>
        <span class="play-count" id="pc-${w.n}"></span>
      </td>
      <td class="split">${w.split}</td>
      <td class="actions">
        <button class="btn-know" onclick="markKnow(${w.n})" aria-label="會">✅</button>
        <button class="btn-forgot" onclick="markForgot(${w.n})" aria-label="不會">❌</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
  updateLessonInfo();
  refreshAllNewBadges();
  WORDS.forEach(w => updatePlayCount(w.n));
}

function updateLessonInfo() {
  const reviewN = WORDS.filter(w => w.isReview).length;
  const newN = WORDS.length - reviewN;
  const markedN = WORDS.filter(w => w._marked).length;
  const pct = WORDS.length === 0 ? 0 : Math.round(markedN / WORDS.length * 100);
  document.getElementById("lessonInfo").innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;font-size:11px;gap:6px;flex-wrap:wrap;line-height:1.4;">
      <div style="display:flex;gap:6px;align-items:center;color:var(--muted);">
        <span><b style="color:var(--ink);">${currentRound}</b> · ${mode}</span>
        <span>🆕${newN}</span>
        ${reviewN > 0 ? `<span>🔁${reviewN}</span>` : ''}
      </div>
      <div style="color:var(--accent);font-weight:600;">${markedN}/${WORDS.length} (${pct}%)</div>
    </div>
    <div style="height:6px;background:#f0ebe0;border-radius:3px;overflow:hidden;margin-top:4px;">
      <div style="height:100%;width:${pct}%;background:var(--accent);transition:width .25s;"></div>
    </div>
  `;
}

function updatePlayCount(n) {
  const w = WORDS.find(x => x.n === n);
  if (!w) return;
  const state = SRS.loadState();
  const ws = state.words[w.word];
  const el = document.getElementById("pc-" + n);
  if (el && ws) el.textContent = ws.playCount > 0 ? `🔊×${ws.playCount}` : "";
  refreshNewBadge(n);
}

function wasInteractedWith(wordKey) {
  const state = SRS.loadState();
  const ws = state.words[wordKey];
  if (!ws) return false;
  if ((ws.playCount || 0) > 0) return true;
  if ((ws.knewItCount || 0) > 0) return true;
  if ((ws.forgotCount || 0) > 0) return true;
  const chunkSum = Object.values(ws.chunkPlays || {}).reduce((a,b) => a+b, 0);
  return chunkSum > 0;
}

function refreshNewBadge(n) {
  const w = WORDS.find(x => x.n === n); if (!w) return;
  const el = document.getElementById("new-" + n); if (!el) return;
  el.classList.toggle("show", !wasInteractedWith(w.word));
}

function refreshAllNewBadges() {
  WORDS.forEach(w => refreshNewBadge(w.n));
}

// ── 播音 ──────────────────────────────────────────────────
function speakOne(n) {
  const w = WORDS.find(x => x.n === n); if (!w) return;
  stopAll();
  document.getElementById("row-" + n)?.classList.add("active");
  // 確保字進入 state
  const state = SRS.loadState();
  SRS.ensureWordState(state, w.word, w);
  SRS.saveState(state);
  SRS.logWordPlay(w.word, w);
  updatePlayCount(n);
  const u = new SpeechSynthesisUtterance(w.word);
  u.lang = "en-US"; u.rate = rate;
  if (chosenVoice) u.voice = chosenVoice;
  u.onend = () => document.getElementById("row-" + n)?.classList.remove("active");
  speechSynthesis.speak(u);
}
function speakChunk(word, chunk, ev) {
  if (ev) ev.stopPropagation();
  stopAll();
  const w = WORDS.find(x => x.word === word);
  if (w) {
    const state = SRS.loadState();
    SRS.ensureWordState(state, w.word, w);
    SRS.saveState(state);
    SRS.logChunkPlay(w.word, chunk, w);
    updatePlayCount(w.n);
  }
  const u = new SpeechSynthesisUtterance(chunk);
  u.lang = "en-US"; u.rate = rate;
  if (chosenVoice) u.voice = chosenVoice;
  speechSynthesis.speak(u);
}
function speakAll() {
  stopAll();
  WORDS.forEach(w => {
    const u = new SpeechSynthesisUtterance(w.word);
    u.lang = "en-US"; u.rate = rate;
    if (chosenVoice) u.voice = chosenVoice;
    u.onstart = () => document.getElementById("row-" + w.n)?.classList.add("active");
    u.onend = () => document.getElementById("row-" + w.n)?.classList.remove("active");
    speechSynthesis.speak(u);
  });
}
function stopAll() {
  speechSynthesis.cancel();
  document.querySelectorAll("tr.active").forEach(tr => tr.classList.remove("active"));
}

// ── 知道 / 不會 標記 ──────────────────────────────────────
function markKnow(n) {
  const w = WORDS.find(x => x.n === n); if (!w) return;
  const state = SRS.loadState();
  SRS.ensureWordState(state, w.word, w);
  SRS.saveState(state);
  SRS.knewIt(w.word, currentRound);
  const tr = document.getElementById("row-" + n);
  tr.querySelectorAll(".btn-know").forEach(b => b.classList.add("on"));
  tr.querySelectorAll(".btn-forgot").forEach(b => b.classList.remove("on"));
  w._marked = "know";
  refreshNewBadge(n);
  updateLessonInfo();
  maybeShowSummary();
}
function markForgot(n) {
  const w = WORDS.find(x => x.n === n); if (!w) return;
  const state = SRS.loadState();
  SRS.ensureWordState(state, w.word, w);
  SRS.saveState(state);
  SRS.forgotIt(w.word, currentRound);
  const tr = document.getElementById("row-" + n);
  tr.querySelectorAll(".btn-forgot").forEach(b => b.classList.add("on"));
  tr.querySelectorAll(".btn-know").forEach(b => b.classList.remove("on"));
  w._marked = "forgot";
  refreshNewBadge(n);
  updateLessonInfo();
  maybeShowSummary();
}

// ── 總結 + Emoji 自評 ─────────────────────────────────────
function maybeShowSummary() {
  // 全部標完才自動跳(完成完美的人會自動觸發)
  if (WORDS.every(w => w._marked)) showSummary();
}
function forceShowSummary() {
  // 學習者主動結束(不管標了幾個)
  if (!confirm("確定結束本輪?未標記的字會延到下一輪。")) return;
  showSummary();
}

function goNextRound() {
  // 直接跳下一輪,不出 summary
  // 沒標的字會被 recordLesson 設 nextDue=R+1,自動延到下一輪
  recordOnLeave();
  location.href = "lesson.html?" + new URLSearchParams(location.search).toString();
}
let _lessonRecorded = false;
let _selectedEval = null;

function showSummary() {
  const knowN = WORDS.filter(w => w._marked === "know").length;
  const forgotN = WORDS.filter(w => w._marked === "forgot").length;
  const skipN = WORDS.length - knowN - forgotN;
  const markedN = knowN + forgotN;
  const acc = markedN === 0 ? 0 : Math.round(knowN / markedN * 100);
  const stage = SRS.loadState().stats.currentStage || 0;
  const skipNote = skipN > 0
    ? `<div style="margin-top:6px;font-size:11px;color:var(--muted);">⏭ ${skipN} 個字沒標記,會延到下一輪</div>`
    : "";
  const nextUrl = "lesson.html?" + new URLSearchParams(location.search).toString();
  document.getElementById("summary").innerHTML = `
    <div class="summary">
      <h2>本輪結束</h2>
      <div class="stats">
        <span>✅ 會:${knowN}</span>
        <span>❌ 不會:${forgotN}</span>
        <span>正確率(已標):${acc}%</span>
      </div>
      ${skipNote}
      <div style="margin-top:8px;font-size:11px;color:var(--muted);">
        Stage ${stage} · 累計 L4 ${SRS.l4Count()} 字 / 學過 ${SRS.totalLearned()} 字
      </div>
      <div style="margin-top:12px;font-size:12px;color:var(--muted);">這輪感覺?(選不選都行)</div>
      <div class="emoji-eval" id="emojiEval">
        <button data-emoji="😎" onclick="pickEval('😎')">😎 太簡單</button>
        <button data-emoji="👍" onclick="pickEval('👍')">👍 剛剛好</button>
        <button data-emoji="😅" onclick="pickEval('😅')">😅 偏難</button>
        <button data-emoji="😵" onclick="pickEval('😵')">😵 太難</button>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;">
        <a href="${nextUrl}" onclick="recordOnLeave()" style="flex:1;min-width:140px;padding:10px 14px;background:var(--accent);color:#fff;text-decoration:none;border-radius:6px;text-align:center;font-weight:600;">▶ 下一輪</a>
        <a href="index.html" onclick="recordOnLeave()" style="flex:1;min-width:120px;padding:10px 14px;background:#fff;color:var(--accent);text-decoration:none;border:1px solid var(--accent);border-radius:6px;text-align:center;font-weight:600;">🏠 回首頁</a>
      </div>
    </div>
  `;
  setTimeout(() => document.getElementById("summary").scrollIntoView({ behavior: "smooth", block: "start" }), 100);
}

function pickEval(emoji) {
  _selectedEval = emoji;
  // Highlight 選中的 emoji
  document.querySelectorAll("#emojiEval button").forEach(b => {
    b.style.background = b.dataset.emoji === emoji ? "var(--accent-soft)" : "#fff";
    b.style.borderColor = b.dataset.emoji === emoji ? "var(--accent)" : "var(--border)";
  });
}

function recordOnLeave() {
  if (_lessonRecorded) return;
  _lessonRecorded = true;
  // ⭐ 強制把本輪所有字進 state.words(即使沒互動)
  // → 避免下一輪又抽到同樣的字
  const state = SRS.loadState();
  WORDS.forEach(w => SRS.ensureWordState(state, w.word, w));
  SRS.saveState(state);
  SRS.recordLesson(currentRound, mode, WORDS.map(w => w.word), _selectedEval);
}
// (舊 submitEval / nextSuggestion 已移除,改用 pickEval + recordOnLeave)

// ── 字池偵測 ──────────────────────────────────────────────
function checkPoolWarning() {
  const ps = window._poolStatus;
  if (!ps) return;
  const themeName = themeFilter ? `「${themeFilter}」主題` : "本字池";
  let msg = null;
  if (ps.actual === 0) {
    msg = `${themeName}已經沒有任何字可上 — 你已經學過或練過所有字。\n\n建議:\n• 換別的主題\n• 切到 📚 純複習 鞏固\n• 或升 Stage 解鎖更多字`;
  } else if (ps.actualNew === 0 && ps.requestedNew > 0) {
    msg = `${themeName}已經沒有「新字」可學了 — 全部字你都已經見過。\n\n這輪 ${ps.actual} 字全是「複習」字。\n\n建議:\n• 換別的主題學新字\n• 繼續複習鞏固這個主題到 L4`;
  } else if (ps.actualNew < ps.requestedNew) {
    const short = ps.requestedNew - ps.actualNew;
    msg = `提醒:${themeName}的新字快用完了。\n\n本輪預計 ${ps.requestedNew} 個新字,實際抽到 ${ps.actualNew} 個(少 ${short} 個)。\n剩餘新字:${ps.newPoolRemaining} 個。\n\n之後幾輪會以複習為主。`;
  } else if (ps.actual < ps.requested) {
    msg = `本輪只抽到 ${ps.actual} 個字(預計 ${ps.requested})— 字池資源有限。`;
  }
  if (msg) {
    // 用非阻塞 banner 顯示在卡片上方
    const banner = document.createElement("div");
    banner.style.cssText = "background:#fff4e0;border:1px solid var(--accent);border-radius:8px;padding:10px 14px;margin:8px 0;font-size:13px;line-height:1.5;color:var(--ink);white-space:pre-line;position:relative;";
    banner.innerHTML = `<span style="font-weight:600;color:var(--accent);">⚠️ 字池提示</span>\n${msg}<button onclick="this.parentElement.remove()" style="position:absolute;top:6px;right:8px;background:none;border:none;font-size:16px;cursor:pointer;color:var(--muted);">×</button>`;
    const wrap = document.querySelector(".wrap") || document.body;
    const lessonInfo = document.getElementById("lessonInfo");
    if (lessonInfo && lessonInfo.parentNode) {
      lessonInfo.parentNode.insertBefore(banner, lessonInfo.nextSibling);
    } else {
      wrap.insertBefore(banner, wrap.firstChild);
    }
  }
}

// ── 啟動 ──────────────────────────────────────────────────
(async function init() {
  applyPinyinSetting(SRS.getSettings().showPinyin !== false);
  const data = await loadData();
  WORDS = pickWords(data);
  if (WORDS.length === 0) {
    document.getElementById("rows").innerHTML = `<tr><td><div class="loading">本輪沒有可上的字 — 試試別的模式</div></td></tr>`;
    document.getElementById("lessonInfo").textContent = mode + " · 無字可上";
    checkPoolWarning();
    return;
  }
  render();
  checkPoolWarning();
})();
</script>
</body>
</html>
